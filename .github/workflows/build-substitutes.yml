name: "Build Substitutes"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - flake.lock
      - pkgs/**
      - outputs/**
      - inputs/*/packages/**
      - private/inputs/*/packages/**
      - private/pkgs/**
      - private/outputs/**
      - .github/workflows/build-substitutes.yml

permissions:
  contents: read

concurrency:
  group: build-substitutes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover-packages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}
      - uses: cachix/install-nix-action@v31
      - id: matrix
        name: Discover package outputs
        run: |
          matrix=$(
            nix eval --json 'path:.#packages' --apply '
              packages:
              let
                concatMap = f: xs: builtins.concatLists (map f xs);
                runnerFor = system:
                  {
                    x86_64-linux = "ubuntu-latest";
                    aarch64-linux = "ubuntu-24.04-arm";
                    aarch64-darwin = "macos-latest";
                  }.${system} or null;
                quietAttrs = {
                  p0 = true;
                  p1 = true;
                  p2 = true;
                };
                freeDiskAttrs = {
                  "x86_64-linux.p0" = true;
                };
                packageJobs = concatMap (
                  system:
                  let
                    runner = runnerFor system;
                  in
                  if runner == null then
                    [ ]
                  else
                    map (attr: {
                      inherit attr runner system;
                      free_disk = freeDiskAttrs."${system}.${attr}" or false;
                      quiet = quietAttrs.${attr} or false;
                    }) (builtins.attrNames packages.${system})
                ) (builtins.attrNames packages);
              in
              { include = packageJobs; }'
          )
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  packages:
    name: ${{ matrix.system }} / ${{ matrix.attr }}
    needs: discover-packages
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-packages.outputs.matrix) }}
    steps:
      - uses: jlumbroso/free-disk-space@main
        if: ${{ matrix.free_disk }}
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v14
        with:
          name: hgl
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ${{ matrix.attr }}
        run: |
          if [[ "${{ matrix.quiet }}" == "true" ]]; then
            nix build --no-link "path:.#packages.${{ matrix.system }}.${{ matrix.attr }}" &>/dev/null
          else
            nix build --no-link --print-build-logs "path:.#packages.${{ matrix.system }}.${{ matrix.attr }}"
          fi
